networks:
  my_network: {}

services:
  weatherbot:
    build:
      context: .
    network_mode: "host"
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true -Djava.net.preferIPv6Addresses=false"
      db.url: "jdbc:postgresql://127.0.0.1:5432/postgres?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres
    network_mode: "host"
    hostname: postgres
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
